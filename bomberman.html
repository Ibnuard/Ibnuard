<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ibnuard - Playable Bomberman Contributions</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@500;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #1a1b26;
      --panel: #16161e;
      --border: #414868;
      --text: #c0caf5;
      --primary: #bb9af7;
      --green: #73daca;
      --red: #f7768e;
      --blue: #7db9f5;
      --yellow: #e0af68;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      overflow: hidden;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    body::before {
      content: " ";
      display: block;
      position: fixed;
      top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
      z-index: 9999;
      background-size: 100% 4px, 6px 100%;
      pointer-events: none;
    }

    .panel {
      background-color: var(--panel);
      border: 3px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .panel-title {
      font-family: 'Fira Code', monospace;
      font-size: 1.2rem;
      color: var(--yellow);
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 2px solid var(--border);
      padding-bottom: 10px;
      width: 100%;
    }

    .game-hud {
      display: flex;
      justify-content: space-between;
      width: 100%;
      font-family: 'Fira Code', monospace;
      font-size: 0.9rem;
      background-color: #11111b;
      padding: 10px 20px;
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    .hud-stat span {
      color: var(--yellow);
      font-weight: bold;
    }

    .canvas-wrap {
      position: relative;
      background-color: #0f0f15;
      border: 4px solid var(--primary);
      border-radius: 8px;
      box-shadow: 0 0 20px rgba(187, 154, 247, 0.2);
      overflow: hidden;
      width: 100%;
      max-width: 820px;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
    }

    .controls-help {
      font-size: 0.85rem;
      color: #7982a9;
      text-align: center;
      line-height: 1.4;
    }

    .controls-help kbd {
      background-color: #313244;
      color: #cdd6f4;
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid #45475a;
      font-family: 'Fira Code', monospace;
      font-size: 0.75rem;
    }

    .back-btn {
      color: #7982a9;
      font-size: 0.85rem;
      text-decoration: none;
      font-family: 'Fira Code', monospace;
      margin-top: 10px;
    }
    .back-btn:hover {
      color: var(--primary);
    }
  </style>
</head>
<body>

  <div class="panel">
    <div class="panel-title">
      <span>👾</span> Playable Bomberman Contributions
    </div>

    <div class="game-hud">
      <div class="hud-stat">YEARLY COMMITS: <span id="hudYearly">1,143</span></div>
      <div class="hud-stat">BRICKS CLEARED: <span id="hudCleared">0</span></div>
      <div class="hud-stat">STATUS: <span id="hudStatus" style="color: var(--green);">PLAYING</span></div>
    </div>

    <div class="canvas-wrap">
      <canvas id="gameCanvas" width="820" height="150"></canvas>
    </div>

    <div class="controls-help">
      Use Keyboard <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> or <kbd>Arrow Keys</kbd> to move.<br>
      Press <kbd>Spacebar</kbd> to drop a bomb! Clay bricks get destroyed; green commits are solid steel!
    </div>

    <a href="index.html" class="back-btn">&lt; Back to Arcade</a>
  </div>

  <script>
    let contribData = { total: "1,143", days: [] };

    fetch('./contributions.json')
      .then(res => res.json())
      .then(data => {
        contribData = data;
        document.getElementById('hudYearly').innerText = data.total;
        initGame();
      })
      .catch(err => {
        console.warn(err);
        // Fallback grid
        const dummyDays = [];
        const start = new Date();
        start.setDate(start.getDate() - 370);
        for(let i=0; i<370; i++) {
          const dateStr = start.toISOString().split('T')[0];
          const isNewer = i > 250;
          const level = Math.random() < (isNewer ? 0.6 : 0.1) ? Math.floor(Math.random() * 5) : 0;
          dummyDays.push({ date: dateStr, level: level });
          start.setDate(start.getDate() + 1);
        }
        contribData.days = dummyDays;
        initGame();
      });

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const CELL_SIZE = 12.5;
    const GRID_COLS = 53;
    const GRID_ROWS = 7;
    const OFFSET_X = 20;
    const OFFSET_Y = 25;
    
    let grid = [];
    let player = { x: 0, y: 0, targetX: 0, targetY: 0, moveProgress: 0 };
    let bombs = [];
    let explosions = [];
    let bricksCleared = 0;
    let keysPressed = {};

    function initGame() {
      grid = [];
      const days = contribData.days;
      if (!days || days.length === 0) return;
      
      const startDate = new Date(days[0].date);
      const startRow = startDate.getDay();
      
      let col = 0;
      let row = startRow;
      
      for(let i=0; i<days.length; i++) {
        if (col >= GRID_COLS) break;
        grid.push({
          col: col,
          row: row,
          level: days[i].level,
          isBrick: days[i].level === 0,
          isDestroyed: false
        });
        row++;
        if (row === GRID_ROWS) { row = 0; col++; }
      }
      
      let foundStart = false;
      for(let c=0; c<GRID_COLS; c++) {
        for(let r=0; r<GRID_ROWS; r++) {
          const cell = getCell(c, r);
          if (cell && cell.isBrick) {
            player.x = c; player.y = r;
            player.targetX = c; player.targetY = r;
            cell.isBrick = false;
            foundStart = true;
            break;
          }
        }
        if (foundStart) break;
      }
      
      bombs = []; explosions = []; bricksCleared = 0;
      document.getElementById('hudCleared').innerText = bricksCleared;
      document.getElementById('hudStatus').innerText = "PLAYING";
      document.getElementById('hudStatus').style.color = "var(--green)";
      
      requestAnimationFrame(gameLoop);
    }

    function getCell(c, r) { return grid.find(cell => cell.col === c && cell.row === r); }

    window.addEventListener('keydown', (e) => {
      keysPressed[e.key.toLowerCase()] = true;
      if (e.key === " ") { e.preventDefault(); spawnBomb(); }
    });

    window.addEventListener('keyup', (e) => { keysPressed[e.key.toLowerCase()] = false; });

    function spawnBomb() {
      const px = Math.round(player.x);
      const py = Math.round(player.y);
      if (bombs.some(b => b.x === px && b.y === py)) return;
      bombs.push({ x: px, y: py, timer: 1500, flashTimer: 0 });
    }

    function movePlayer() {
      if (player.x === player.targetX && player.y === player.targetY) {
        let dx = 0, dy = 0;
        if (keysPressed['w'] || keysPressed['arrowup']) dy = -1;
        else if (keysPressed['s'] || keysPressed['arrowdown']) dy = 1;
        else if (keysPressed['a'] || keysPressed['arrowleft']) dx = -1;
        else if (keysPressed['d'] || keysPressed['arrowright']) dx = 1;
        
        if (dx !== 0 || dy !== 0) {
          const nx = player.x + dx;
          const ny = player.y + dy;
          if (nx >= 0 && nx < GRID_COLS && ny >= 0 && ny < GRID_ROWS) {
            const nextCell = getCell(nx, ny);
            if (nextCell && !nextCell.isBrick && nextCell.level === 0) {
              player.targetX = nx; player.targetY = ny; player.moveProgress = 0;
            }
          }
        }
      } else {
        player.moveProgress += 0.2;
        if (player.moveProgress >= 1) {
          player.x = player.targetX; player.y = player.targetY;
        } else {
          player.x = player.x + (player.targetX - player.x) * 0.2;
          player.y = player.y + (player.targetY - player.y) * 0.2;
        }
      }
    }

    let lastTime = 0;
    function gameLoop(time) {
      const dt = time - lastTime;
      lastTime = time;
      update(dt);
      draw();
      requestAnimationFrame(gameLoop);
    }

    function update(dt) {
      movePlayer();
      for (let i = bombs.length - 1; i >= 0; i--) {
        const bomb = bombs[i];
        bomb.timer -= dt;
        bomb.flashTimer += dt;
        if (bomb.timer <= 0) {
          triggerExplosion(bomb.x, bomb.y);
          bombs.splice(i, 1);
        }
      }
      for (let i = explosions.length - 1; i >= 0; i--) {
        const exp = explosions[i];
        exp.duration -= dt;
        if (exp.duration <= 0) explosions.splice(i, 1);
      }
    }

    function triggerExplosion(bx, by) {
      const radius = 2;
      const cellsToBlow = [[bx, by]];
      const dirs = [[0, -1], [0, 1], [-1, 0], [1, 0]];
      
      dirs.forEach(dir => {
        for(let r=1; r<=radius; r++) {
          const cx = bx + dir[0] * r;
          const cy = by + dir[1] * r;
          if (cx >= 0 && cx < GRID_COLS && cy >= 0 && cy < GRID_ROWS) {
            const cell = getCell(cx, cy);
            cellsToBlow.push([cx, cy]);
            if (cell) {
              if (cell.level > 0) break;
              if (cell.isBrick) {
                cell.isBrick = false;
                cell.isDestroyed = true;
                bricksCleared++;
                document.getElementById('hudCleared').innerText = bricksCleared;
                break;
              }
            }
          }
        }
      });
      
      explosions.push({ center: { x: bx, y: by }, cells: cellsToBlow, duration: 500 });
      
      const px = Math.round(player.x);
      const py = Math.round(player.y);
      const playerHit = cellsToBlow.some(c => c[0] === px && c[1] === py);
      
      if (playerHit) {
        document.getElementById('hudStatus').innerText = "BLOWN UP!";
        document.getElementById('hudStatus').style.color = "var(--red)";
        setTimeout(() => initGame(), 1000);
      }
    }

    function draw() {
      ctx.fillStyle = '#0f0f15';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      ctx.fillStyle = '#2d3139';
      for(let col=0; col<GRID_COLS; col++) {
        for(let row=0; row<GRID_ROWS; row++) {
          const cx = OFFSET_X + col * CELL_SIZE + 6;
          const cy = OFFSET_Y + row * CELL_SIZE + 6;
          ctx.beginPath(); ctx.arc(cx, cy, 1.2, 0, 2 * Math.PI); ctx.fill();
        }
      }
      
      grid.forEach(cell => {
        const x = OFFSET_X + cell.col * CELL_SIZE;
        const y = OFFSET_Y + cell.row * CELL_SIZE;
        
        if (cell.level > 0) {
          if (cell.level === 1) ctx.fillStyle = '#145e39';
          else if (cell.level === 2) ctx.fillStyle = '#1fb35a';
          else if (cell.level === 3) ctx.fillStyle = '#3ee27b';
          else if (cell.level === 4) ctx.fillStyle = '#9effc6';
          drawBeveledCube(x, y);
        } else if (cell.isBrick) {
          ctx.fillStyle = '#45475a';
          drawBeveledBrick(x, y);
        }
      });
      
      bombs.forEach(bomb => {
        const x = OFFSET_X + bomb.x * CELL_SIZE + 6;
        const y = OFFSET_Y + bomb.y * CELL_SIZE + 6;
        const isFlash = Math.floor(bomb.flashTimer / 200) % 2 === 0;
        ctx.fillStyle = isFlash ? 'var(--red)' : '#313244';
        ctx.beginPath(); ctx.arc(x, y, 4.5, 0, 2 * Math.PI); ctx.fill();
        ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(x + 1, y - 4); ctx.quadraticCurveTo(x + 4, y - 6, x + 5, y - 8); ctx.stroke();
        ctx.fillStyle = 'var(--yellow)'; ctx.beginPath(); ctx.arc(x + 5, y - 8, 1, 0, 2 * Math.PI); ctx.fill();
      });
      
      explosions.forEach(exp => {
        exp.cells.forEach(cell => {
          const x = OFFSET_X + cell[0] * CELL_SIZE + 1;
          const y = OFFSET_Y + cell[1] * CELL_SIZE + 1;
          ctx.fillStyle = 'rgba(255, 112, 67, 0.8)'; ctx.fillRect(x, y, 10, 10);
          ctx.fillStyle = 'rgba(255, 202, 40, 0.9)'; ctx.fillRect(x + 2, y + 2, 6, 6);
        });
      });
      
      const px = OFFSET_X + player.x * CELL_SIZE + 5;
      const py = OFFSET_Y + player.y * CELL_SIZE + 5;
      ctx.fillStyle = 'var(--blue)'; ctx.fillRect(px - 3, py, 6, 5);
      ctx.fillStyle = 'var(--yellow)'; ctx.fillRect(px - 3, py + 3, 6, 1.5);
      ctx.fillStyle = '#ffffff'; ctx.fillRect(px - 4, py - 7, 8, 7);
      ctx.fillStyle = 'var(--red)'; ctx.beginPath(); ctx.arc(px + 1, py - 9, 1.5, 0, 2 * Math.PI); ctx.fill();
      ctx.fillStyle = '#000000'; ctx.fillRect(px - 2, py - 4, 1, 3); ctx.fillRect(px + 1, py - 4, 1, 3);
    }

    function drawBeveledCube(x, y) {
      ctx.fillRect(x, y, 10, 10);
      ctx.fillStyle = 'rgba(255, 255, 255, 0.4)'; ctx.fillRect(x + 0.8, y + 0.8, 8.4, 1.2); ctx.fillRect(x + 0.8, y + 0.8, 1.2, 8.4);
      ctx.fillStyle = 'rgba(0, 0, 0, 0.5)'; ctx.fillRect(x + 0.8, y + 8.0, 8.4, 1.2); ctx.fillRect(x + 8.0, y + 0.8, 1.2, 8.4);
    }

    function drawBeveledBrick(x, y) {
      ctx.fillRect(x, y, 10, 10);
      ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 0.8;
      ctx.beginPath(); ctx.moveTo(x, y + 4.5); ctx.lineTo(x + 10, y + 4.5);
      ctx.moveTo(x + 5, y); ctx.lineTo(x + 5, y + 4.5);
      ctx.moveTo(x + 3, y + 4.5); ctx.lineTo(x + 3, y + 10);
      ctx.moveTo(x + 7, y + 4.5); ctx.lineTo(x + 7, y + 10);
      ctx.stroke();
      ctx.fillStyle = 'rgba(255, 255, 255, 0.25)'; ctx.fillRect(x + 0.5, y + 0.5, 9, 1); ctx.fillRect(x + 0.5, y + 0.5, 1, 9);
      ctx.fillStyle = 'rgba(0, 0, 0, 0.4)'; ctx.fillRect(x + 0.5, y + 8.5, 9, 1); ctx.fillRect(x + 8.5, y + 0.5, 1, 9);
    }
  </script>
</body>
</html>
