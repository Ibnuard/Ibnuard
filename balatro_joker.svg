<svg viewBox="0 0 240 360" width="240" height="360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Card Border Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- CRT Scanline Pattern -->
    <pattern id="scanlines" width="100" height="4" patternUnits="userSpaceOnUse">
      <rect width="100" height="1" fill="#000000" opacity="0.15" />
    </pattern>

    <!-- Holographic Rainbow Gradient -->
    <linearGradient id="holo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.6" />
      <stop offset="15%" stop-color="#ff00ff" stop-opacity="0.5" />
      <stop offset="30%" stop-color="#7f00ff" stop-opacity="0.5" />
      <stop offset="45%" stop-color="#0000ff" stop-opacity="0.5" />
      <stop offset="60%" stop-color="#00ffff" stop-opacity="0.5" />
      <stop offset="75%" stop-color="#00ff00" stop-opacity="0.5" />
      <stop offset="90%" stop-color="#ffff00" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0.6" />
    </linearGradient>

    <!-- Card Clip Path for the holographic sheen -->
    <clipPath id="card-clip">
      <rect x="10" y="10" width="220" height="340" rx="16" ry="16" />
    </clipPath>
  </defs>

  <style>
    /* Card Floating Animation */
    @keyframes float {
      0% {
        transform: translateY(0px) rotate(0deg);
      }
      25% {
        transform: translateY(-5px) rotate(1deg);
      }
      50% {
        transform: translateY(-8px) rotate(0deg);
      }
      75% {
        transform: translateY(-4px) rotate(-1deg);
      }
      100% {
        transform: translateY(0px) rotate(0deg);
      }
    }

    /* Holographic Shimmer Animation */
    @keyframes holo-shimmer {
      0% {
        transform: translate(-100px, -100px) rotate(0deg);
      }
      50% {
        transform: translate(100px, 100px) rotate(180deg);
      }
      100% {
        transform: translate(-100px, -100px) rotate(360deg);
      }
    }

    /* Pixel Glitch Animation */
    @keyframes glitch {
      0% { opacity: 0.95; }
      5% { opacity: 0.75; }
      10% { opacity: 0.95; }
      45% { opacity: 0.95; }
      50% { opacity: 0.6; }
      55% { opacity: 0.95; }
      100% { opacity: 0.95; }
    }

    /* Holographic Hue Rotation */
    @keyframes hue-rotate {
      0% { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }

    .card-container {
      transform-origin: center center;
      animation: float 6s ease-in-out infinite;
    }

    .holo-overlay {
      animation: holo-shimmer 8s linear infinite, hue-rotate 12s linear infinite;
      mix-blend-mode: color-dodge;
      pointer-events: none;
    }

    .retro-text {
      font-family: 'Courier New', Courier, monospace;
      font-weight: 900;
    }

    .pixel-text {
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
    }

    .glitch-text {
      animation: glitch 4s infinite;
    }
  </style>

  <g class="card-container">
    <!-- Card Shadow & Border -->
    <rect x="10" y="10" width="220" height="340" rx="16" ry="16" fill="#11111b" stroke="#313244" stroke-width="6" filter="url(#glow)" />
    <!-- Inner Card Background -->
    <rect x="13" y="13" width="214" height="334" rx="13" ry="13" fill="#181825" />

    <!-- Card Background Grid Pattern -->
    <g opacity="0.15">
      <line x1="13" y1="50" x2="227" y2="50" stroke="#cdd6f4" stroke-width="1" />
      <line x1="13" y1="100" x2="227" y2="100" stroke="#cdd6f4" stroke-width="1" />
      <line x1="13" y1="150" x2="227" y2="150" stroke="#cdd6f4" stroke-width="1" />
      <line x1="13" y1="200" x2="227" y2="200" stroke="#cdd6f4" stroke-width="1" />
      <line x1="13" y1="250" x2="227" y2="250" stroke="#cdd6f4" stroke-width="1" />
      <line x1="13" y1="300" x2="227" y2="300" stroke="#cdd6f4" stroke-width="1" />
      <line x1="50" y1="13" x2="50" y2="347" stroke="#cdd6f4" stroke-width="1" />
      <line x1="100" y1="13" x2="100" y2="347" stroke="#cdd6f4" stroke-width="1" />
      <line x1="150" y1="13" x2="150" y2="347" stroke="#cdd6f4" stroke-width="1" />
      <line x1="200" y1="13" x2="200" y2="347" stroke="#cdd6f4" stroke-width="1" />
    </g>

    <!-- Top Label/Banner -->
    <rect x="25" y="25" width="190" height="22" rx="4" fill="#313244" />
    <text x="120" y="40" fill="#cdd6f4" text-anchor="middle" font-size="11" class="retro-text" letter-spacing="1">IBNUARD JOKER</text>

    <!-- Card Art Container (Pixel Screen style) -->
    <rect x="25" y="57" width="190" height="130" rx="8" fill="#11111b" stroke="#f5c2e7" stroke-width="2" />
    <!-- CRT Scanlines overlay on Screen -->
    <rect x="27" y="59" width="186" height="126" rx="6" fill="url(#scanlines)" />

    <!-- Joker / Hacker Pixel-Art Illustration inside screen -->
    <g class="glitch-text">
      <!-- Matrix background codes (subtle digital rain effect) -->
      <text x="35" y="75" fill="#a6e3a1" opacity="0.3" font-size="8" class="retro-text">01001001</text>
      <text x="145" y="75" fill="#a6e3a1" opacity="0.3" font-size="8" class="retro-text">01000010</text>
      <text x="35" y="170" fill="#a6e3a1" opacity="0.3" font-size="8" class="retro-text">01001110</text>
      <text x="145" y="170" fill="#a6e3a1" opacity="0.3" font-size="8" class="retro-text">01010101</text>

      <!-- Retro Terminal Shell Icon -->
      <!-- Computer Monitor drawing -->
      <rect x="65" y="75" width="110" height="90" rx="6" fill="#1e1e2e" stroke="#fab387" stroke-width="2" />
      <rect x="70" y="80" width="100" height="65" rx="3" fill="#000000" />
      <!-- Stand -->
      <path d="M 105 147 L 135 147 L 145 160 L 95 160 Z" fill="#585b70" />
      
      <!-- Code inside Monitor -->
      <text x="75" y="93" fill="#a6e3a1" font-size="9" class="retro-text">&gt;_ ibnuard</text>
      <text x="75" y="105" fill="#89b4fa" font-size="7" class="retro-text">status: active</text>
      <text x="75" y="115" fill="#f5c2e7" font-size="7" class="retro-text">mindset: break</text>
      <text x="75" y="125" fill="#f9e2af" font-size="7" class="retro-text">ship: fast_dev</text>
      
      <!-- Flashing Cursor -->
      <rect x="135" y="86" width="5" height="8" fill="#a6e3a1" opacity="0.8">
        <animate attributeName="opacity" values="0.8;0.1;0.8" dur="1s" repeatCount="indefinite" />
      </rect>
    </g>

    <!-- Card Description Area -->
    <rect x="25" y="197" width="190" height="115" rx="8" fill="#11111b" stroke="#45475a" stroke-width="1" />
    
    <!-- Rarity / Type label -->
    <text x="35" y="215" fill="#f38ba8" font-size="9" class="retro-text" font-weight="bold" letter-spacing="0.5">LEGENDARY JOKER</text>
    
    <!-- Balatro-style Mult Modifiers -->
    <!-- Modifier 1: Red box (+8 Mult) -->
    <g transform="translate(35, 225)">
      <rect x="0" y="0" width="50" height="16" rx="4" fill="#f38ba8" />
      <text x="25" y="12" fill="#11111b" font-size="9" text-anchor="middle" class="retro-text" font-weight="900">+8 Mult</text>
    </g>
    <text x="93" y="237" fill="#cdd6f4" font-size="8.5" class="pixel-text">for low-level experiments</text>

    <!-- Modifier 2: Blue box (X1.5 Mult) -->
    <g transform="translate(35, 248)">
      <rect x="0" y="0" width="50" height="16" rx="4" fill="#89b4fa" />
      <text x="25" y="12" fill="#11111b" font-size="9" text-anchor="middle" class="retro-text" font-weight="900">X1.5 Mult</text>
    </g>
    <text x="93" y="260" fill="#cdd6f4" font-size="8.5" class="pixel-text">when building mobile/web</text>

    <!-- Explanatory joker passive text -->
    <text x="35" y="280" fill="#a6adc8" font-size="8" class="pixel-text">"1 in 4 chance to double your speed</text>
    <text x="35" y="292" fill="#a6adc8" font-size="8" class="pixel-text"> and compile with zero errors."</text>

    <!-- Small footer code stamps -->
    <text x="35" y="332" fill="#585b70" font-size="8" class="retro-text">#001</text>
    <text x="205" y="332" fill="#585b70" font-size="8" class="retro-text" text-anchor="end">v2.0.0</text>

    <!-- Holographic Foil Effect Overlay (Clipped to Card Shape) -->
    <g clip-path="url(#card-clip)">
      <rect x="-100" y="-100" width="440" height="560" fill="url(#holo-grad)" class="holo-overlay" />
    </g>
  </g>
</svg>
