<svg viewBox="0 0 320 270" width="320" height="270" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- CRT Glow effect for retro screen -->
    <filter id="screen-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Scanline overlay pattern -->
    <pattern id="scanlines" width="100" height="3" patternUnits="userSpaceOnUse">
      <rect width="100" height="1" fill="#000000" opacity="0.25" />
    </pattern>

    <!-- 3D Beveled Tetris Block Definition -->
    <g id="cube">
      <rect x="0" y="0" width="12" height="12" rx="1.5" />
      <!-- Light highlight (top and left) -->
      <rect x="1" y="1" width="10" height="1.5" fill="#ffffff" opacity="0.4" />
      <rect x="1" y="1" width="1.5" height="10" fill="#ffffff" opacity="0.4" />
      <!-- Dark shadow (bottom and right) -->
      <rect x="1" y="9.5" width="10" height="1.5" fill="#000000" opacity="0.45" />
      <rect x="9.5" y="1" width="1.5" height="10" fill="#000000" opacity="0.45" />
    </g>
  </defs>

  <style>
    /* Global Styles */
    .retro-font {
      font-family: 'Fira Code', 'Courier New', Courier, monospace;
      font-weight: 900;
    }
    
    /* Animation Loop: 12 seconds total */
    
    /* 1. I-Piece (Medium Green Level 3) Falling and Splitting */
    @keyframes i-fall {
      0% { transform: translateY(-60px); opacity: 1; }
      5% { transform: translateY(0px); opacity: 1; }
      25% { transform: translateY(190px); opacity: 1; } /* Lands on row 12 (y=190) */
      65% { transform: translateY(190px); opacity: 1; }
      65.1% { transform: translateY(204px); opacity: 1; } /* Drops 1 cell down after row 15 clear */
      95% { transform: translateY(204px); opacity: 1; }
      96%, 100% { opacity: 0; } /* Reset phase */
    }
    .i-piece-fall {
      animation: i-fall 12s infinite steps(1);
    }
    
    /* Row 15 blocks flash and clear */
    @keyframes row-clear-flash {
      0%, 55% { opacity: 1; }
      56%, 58%, 60%, 62% { filter: brightness(2.5); opacity: 1; }
      57%, 59%, 61%, 63% { filter: none; opacity: 1; }
      64% { filter: brightness(2.5); opacity: 1; }
      65%, 95% { opacity: 0; }
      96%, 100% { opacity: 1; }
    }
    .row15-clear {
      animation: row-clear-flash 12s infinite;
    }
    
    /* Remaining blocks drop after row 15 clear */
    @keyframes block-drop {
      0%, 65% { transform: translateY(0px); }
      65.1%, 95% { transform: translateY(14px); }
      96%, 100% { transform: translateY(0px); }
    }
    .row14-drop {
      animation: block-drop 12s infinite steps(1);
    }

    /* 2. T-Piece (Bright Green Level 4) Falling and Landing */
    @keyframes t-fall {
      0%, 68% { transform: translateY(-60px); opacity: 0; }
      69% { transform: translateY(-40px); opacity: 1; }
      85% { transform: translateY(148px); opacity: 1; } /* Lands on top of dropped pile */
      95% { transform: translateY(148px); opacity: 1; }
      96%, 100% { opacity: 0; } /* Reset phase */
    }
    .t-piece-fall {
      animation: t-fall 12s infinite steps(1);
    }

    /* Score Indicator Animation */
    @keyframes score-tick {
      0%, 55% { fill: #fab387; }
      56% { fill: #ffffff; }
      60%, 100% { fill: #a6e3a1; }
    }
    .score-val {
      animation: score-tick 12s infinite;
    }

    .grid-dot {
      fill: #313244;
    }
  </style>

  <!-- Main Arcade Frame (Retro CRT Monitor styling) -->
  <rect x="5" y="5" width="310" height="260" rx="12" ry="12" fill="#11111b" stroke="#7aa2f7" stroke-width="4" filter="url(#screen-glow)" />
  <!-- CRT Screen Inner Screen -->
  <rect x="12" y="12" width="296" height="246" rx="8" ry="8" fill="#181825" />
  <!-- Scanline Overlay -->
  <rect x="12" y="12" width="296" height="246" rx="8" ry="8" fill="url(#scanlines)" pointer-events="none" />

  <!-- ================= PLAYING BOARD ================= -->
  <!-- Board Inner Frame -->
  <rect x="20" y="20" width="144" height="230" rx="4" fill="#11111b" stroke="#45475a" stroke-width="2" />
  
  <!-- Grid Dots Background -->
  <g opacity="0.25">
    <!-- Col dots: x=27, 41, 55, 69, 83, 97, 111, 125, 139, 153 -->
    <!-- Rows: y=27, 41, 55, 69, 83, 97, 111, 125, 139, 153, 167, 181, 195, 209, 223, 237 -->
    <rect x="27" y="27" width="2" height="2" class="grid-dot" /><rect x="41" y="27" width="2" height="2" class="grid-dot" /><rect x="55" y="27" width="2" height="2" class="grid-dot" /><rect x="69" y="27" width="2" height="2" class="grid-dot" /><rect x="83" y="27" width="2" height="2" class="grid-dot" /><rect x="97" y="27" width="2" height="2" class="grid-dot" /><rect x="111" y="27" width="2" height="2" class="grid-dot" /><rect x="125" y="27" width="2" height="2" class="grid-dot" /><rect x="139" y="27" width="2" height="2" class="grid-dot" /><rect x="153" y="27" width="2" height="2" class="grid-dot" />
    <rect x="27" y="41" width="2" height="2" class="grid-dot" /><rect x="41" y="41" width="2" height="2" class="grid-dot" /><rect x="55" y="41" width="2" height="2" class="grid-dot" /><rect x="69" y="41" width="2" height="2" class="grid-dot" /><rect x="83" y="41" width="2" height="2" class="grid-dot" /><rect x="97" y="41" width="2" height="2" class="grid-dot" /><rect x="111" y="41" width="2" height="2" class="grid-dot" /><rect x="125" y="41" width="2" height="2" class="grid-dot" /><rect x="139" y="41" width="2" height="2" class="grid-dot" /><rect x="153" y="41" width="2" height="2" class="grid-dot" />
    <rect x="27" y="55" width="2" height="2" class="grid-dot" /><rect x="41" y="55" width="2" height="2" class="grid-dot" /><rect x="55" y="55" width="2" height="2" class="grid-dot" /><rect x="69" y="55" width="2" height="2" class="grid-dot" /><rect x="83" y="55" width="2" height="2" class="grid-dot" /><rect x="97" y="55" width="2" height="2" class="grid-dot" /><rect x="111" y="55" width="2" height="2" class="grid-dot" /><rect x="125" y="55" width="2" height="2" class="grid-dot" /><rect x="139" y="55" width="2" height="2" class="grid-dot" /><rect x="153" y="55" width="2" height="2" class="grid-dot" />
    <rect x="27" y="69" width="2" height="2" class="grid-dot" /><rect x="41" y="69" width="2" height="2" class="grid-dot" /><rect x="55" y="69" width="2" height="2" class="grid-dot" /><rect x="69" y="69" width="2" height="2" class="grid-dot" /><rect x="83" y="69" width="2" height="2" class="grid-dot" /><rect x="97" y="69" width="2" height="2" class="grid-dot" /><rect x="111" y="69" width="2" height="2" class="grid-dot" /><rect x="125" y="69" width="2" height="2" class="grid-dot" /><rect x="139" y="69" width="2" height="2" class="grid-dot" /><rect x="153" y="69" width="2" height="2" class="grid-dot" />
    <rect x="27" y="83" width="2" height="2" class="grid-dot" /><rect x="41" y="83" width="2" height="2" class="grid-dot" /><rect x="55" y="83" width="2" height="2" class="grid-dot" /><rect x="69" y="83" width="2" height="2" class="grid-dot" /><rect x="83" y="83" width="2" height="2" class="grid-dot" /><rect x="97" y="83" width="2" height="2" class="grid-dot" /><rect x="111" y="83" width="2" height="2" class="grid-dot" /><rect x="125" y="83" width="2" height="2" class="grid-dot" /><rect x="139" y="83" width="2" height="2" class="grid-dot" /><rect x="153" y="83" width="2" height="2" class="grid-dot" />
    <rect x="27" y="97" width="2" height="2" class="grid-dot" /><rect x="41" y="97" width="2" height="2" class="grid-dot" /><rect x="55" y="97" width="2" height="2" class="grid-dot" /><rect x="69" y="97" width="2" height="2" class="grid-dot" /><rect x="83" y="97" width="2" height="2" class="grid-dot" /><rect x="97" y="97" width="2" height="2" class="grid-dot" /><rect x="111" y="97" width="2" height="2" class="grid-dot" /><rect x="125" y="97" width="2" height="2" class="grid-dot" /><rect x="139" y="97" width="2" height="2" class="grid-dot" /><rect x="153" y="97" width="2" height="2" class="grid-dot" />
    <rect x="27" y="111" width="2" height="2" class="grid-dot" /><rect x="41" y="111" width="2" height="2" class="grid-dot" /><rect x="55" y="111" width="2" height="2" class="grid-dot" /><rect x="69" y="111" width="2" height="2" class="grid-dot" /><rect x="83" y="111" width="2" height="2" class="grid-dot" /><rect x="97" y="111" width="2" height="2" class="grid-dot" /><rect x="111" y="111" width="2" height="2" class="grid-dot" /><rect x="125" y="111" width="2" height="2" class="grid-dot" /><rect x="139" y="111" width="2" height="2" class="grid-dot" /><rect x="153" y="111" width="2" height="2" class="grid-dot" />
    <rect x="27" y="125" width="2" height="2" class="grid-dot" /><rect x="41" y="125" width="2" height="2" class="grid-dot" /><rect x="55" y="125" width="2" height="2" class="grid-dot" /><rect x="69" y="125" width="2" height="2" class="grid-dot" /><rect x="83" y="125" width="2" height="2" class="grid-dot" /><rect x="97" y="125" width="2" height="2" class="grid-dot" /><rect x="111" y="125" width="2" height="2" class="grid-dot" /><rect x="125" y="125" width="2" height="2" class="grid-dot" /><rect x="139" y="125" width="2" height="2" class="grid-dot" /><rect x="153" y="125" width="2" height="2" class="grid-dot" />
    <rect x="27" y="139" width="2" height="2" class="grid-dot" /><rect x="41" y="139" width="2" height="2" class="grid-dot" /><rect x="55" y="139" width="2" height="2" class="grid-dot" /><rect x="69" y="139" width="2" height="2" class="grid-dot" /><rect x="83" y="139" width="2" height="2" class="grid-dot" /><rect x="97" y="139" width="2" height="2" class="grid-dot" /><rect x="111" y="139" width="2" height="2" class="grid-dot" /><rect x="125" y="139" width="2" height="2" class="grid-dot" /><rect x="139" y="139" width="2" height="2" class="grid-dot" /><rect x="153" y="139" width="2" height="2" class="grid-dot" />
    <rect x="27" y="153" width="2" height="2" class="grid-dot" /><rect x="41" y="153" width="2" height="2" class="grid-dot" /><rect x="55" y="153" width="2" height="2" class="grid-dot" /><rect x="69" y="153" width="2" height="2" class="grid-dot" /><rect x="83" y="153" width="2" height="2" class="grid-dot" /><rect x="97" y="153" width="2" height="2" class="grid-dot" /><rect x="111" y="153" width="2" height="2" class="grid-dot" /><rect x="125" y="153" width="2" height="2" class="grid-dot" /><rect x="139" y="153" width="2" height="2" class="grid-dot" /><rect x="153" y="153" width="2" height="2" class="grid-dot" />
    <rect x="27" y="167" width="2" height="2" class="grid-dot" /><rect x="41" y="167" width="2" height="2" class="grid-dot" /><rect x="55" y="167" width="2" height="2" class="grid-dot" /><rect x="69" y="167" width="2" height="2" class="grid-dot" /><rect x="83" y="167" width="2" height="2" class="grid-dot" /><rect x="97" y="167" width="2" height="2" class="grid-dot" /><rect x="111" y="167" width="2" height="2" class="grid-dot" /><rect x="125" y="167" width="2" height="2" class="grid-dot" /><rect x="139" y="167" width="2" height="2" class="grid-dot" /><rect x="153" y="167" width="2" height="2" class="grid-dot" />
    <rect x="27" y="181" width="2" height="2" class="grid-dot" /><rect x="41" y="181" width="2" height="2" class="grid-dot" /><rect x="55" y="181" width="2" height="2" class="grid-dot" /><rect x="69" y="181" width="2" height="2" class="grid-dot" /><rect x="83" y="181" width="2" height="2" class="grid-dot" /><rect x="97" y="181" width="2" height="2" class="grid-dot" /><rect x="111" y="181" width="2" height="2" class="grid-dot" /><rect x="125" y="181" width="2" height="2" class="grid-dot" /><rect x="139" y="181" width="2" height="2" class="grid-dot" /><rect x="153" y="181" width="2" height="2" class="grid-dot" />
    <rect x="27" y="195" width="2" height="2" class="grid-dot" /><rect x="41" y="195" width="2" height="2" class="grid-dot" /><rect x="55" y="195" width="2" height="2" class="grid-dot" /><rect x="69" y="195" width="2" height="2" class="grid-dot" /><rect x="83" y="195" width="2" height="2" class="grid-dot" /><rect x="97" y="195" width="2" height="2" class="grid-dot" /><rect x="111" y="195" width="2" height="2" class="grid-dot" /><rect x="125" y="195" width="2" height="2" class="grid-dot" /><rect x="139" y="195" width="2" height="2" class="grid-dot" /><rect x="153" y="195" width="2" height="2" class="grid-dot" />
    <rect x="27" y="209" width="2" height="2" class="grid-dot" /><rect x="41" y="209" width="2" height="2" class="grid-dot" /><rect x="55" y="209" width="2" height="2" class="grid-dot" /><rect x="69" y="209" width="2" height="2" class="grid-dot" /><rect x="83" y="209" width="2" height="2" class="grid-dot" /><rect x="97" y="209" width="2" height="2" class="grid-dot" /><rect x="111" y="209" width="2" height="2" class="grid-dot" /><rect x="125" y="209" width="2" height="2" class="grid-dot" /><rect x="139" y="209" width="2" height="2" class="grid-dot" /><rect x="153" y="209" width="2" height="2" class="grid-dot" />
    <rect x="27" y="223" width="2" height="2" class="grid-dot" /><rect x="41" y="223" width="2" height="2" class="grid-dot" /><rect x="55" y="223" width="2" height="2" class="grid-dot" /><rect x="69" y="223" width="2" height="2" class="grid-dot" /><rect x="83" y="223" width="2" height="2" class="grid-dot" /><rect x="97" y="223" width="2" height="2" class="grid-dot" /><rect x="111" y="223" width="2" height="2" class="grid-dot" /><rect x="125" y="223" width="2" height="2" class="grid-dot" /><rect x="139" y="223" width="2" height="2" class="grid-dot" /><rect x="153" y="223" width="2" height="2" class="grid-dot" />
