  </g>

  <!-- ================= ANIMATED FALLING PIECES ================= -->
  <!-- 1. I-Piece (Level 3 Green #26a641): Drops down column 2 (x=50) -->
  <g class="i-piece-fall">
    <!-- Block 0: Row 12 (y=190 when landed) -->
    <use href="#cube" x="50" y="0" fill="#26a641" class="row14-drop" />
    <!-- Block 1: Row 13 (y=204 when landed) -->
    <use href="#cube" x="50" y="14" fill="#26a641" class="row14-drop" />
    <!-- Block 2: Row 14 (y=218 when landed) -->
    <use href="#cube" x="50" y="28" fill="#26a641" class="row14-drop" />
    <!-- Block 3: Row 15 (y=232 when landed) -> Clears! -->
    <use href="#cube" x="50" y="42" fill="#26a641" class="row15-clear" />
  </g>

  <!-- 2. T-Piece (Level 4 Green #39d353): Drops in columns 4, 5, 6 (starts at 7.5s) -->
  <g class="t-piece-fall">
    <!-- Center bottom block -->
    <use href="#cube" x="92" y="14" fill="#39d353" />
    <!-- Top row blocks -->
    <use href="#cube" x="78" y="0" fill="#39d353" />
    <use href="#cube" x="92" y="0" fill="#39d353" />
    <use href="#cube" x="106" y="0" fill="#39d353" />
  </g>

  <!-- ================= STATIC STACKED PILE ================= -->
  <!-- Based on real contribution history: Dense and active on right, sparse on left. -->
  <g stroke-width="0">
    <!-- ROW 15 (y = 232). Bottom-most row. Clears at 65% in loop! -->
    <use href="#cube" x="22" y="232" fill="#0e4429" class="row15-clear" /> <!-- Col 0 -->
    <use href="#cube" x="36" y="232" fill="#006d32" class="row15-clear" /> <!-- Col 1 -->
    <!-- Col 2 is empty for I-piece to drop in -->
    <use href="#cube" x="64" y="232" fill="#0e4429" class="row15-clear" /> <!-- Col 3 -->
    <use href="#cube" x="78" y="232" fill="#006d32" class="row15-clear" /> <!-- Col 4 -->
    <use href="#cube" x="92" y="232" fill="#26a641" class="row15-clear" /> <!-- Col 5 -->
    <use href="#cube" x="106" y="232" fill="#39d353" class="row15-clear" /> <!-- Col 6 -->
    <use href="#cube" x="120" y="232" fill="#39d353" class="row15-clear" /> <!-- Col 7 -->
    <use href="#cube" x="134" y="232" fill="#39d353" class="row15-clear" /> <!-- Col 8 -->
    <use href="#cube" x="148" y="232" fill="#26a641" class="row15-clear" /> <!-- Col 9 -->

    <!-- ROW 14 (y = 218). Drops down to Row 15 at 65% -->
    <use href="#cube" x="36" y="218" fill="#0e4429" class="row14-drop" /> <!-- Col 1 -->
    <use href="#cube" x="78" y="218" fill="#26a641" class="row14-drop" /> <!-- Col 4 -->
    <use href="#cube" x="92" y="218" fill="#0e4429" class="row14-drop" /> <!-- Col 5 -->
    <use href="#cube" x="106" y="218" fill="#006d32" class="row14-drop" /> <!-- Col 6 -->
    <use href="#cube" x="120" y="218" fill="#26a641" class="row14-drop" /> <!-- Col 7 -->
    <use href="#cube" x="134" y="218" fill="#39d353" class="row14-drop" /> <!-- Col 8 -->
    <use href="#cube" x="148" y="218" fill="#006d32" class="row14-drop" /> <!-- Col 9 -->

    <!-- ROW 13 (y = 204). Drops down to Row 14 at 65% -->
    <use href="#cube" x="106" y="204" fill="#0e4429" class="row14-drop" /> <!-- Col 6 -->
    <use href="#cube" x="120" y="204" fill="#26a641" class="row14-drop" /> <!-- Col 7 -->
    <use href="#cube" x="134" y="204" fill="#26a641" class="row14-drop" /> <!-- Col 8 -->
    <use href="#cube" x="148" y="204" fill="#0e4429" class="row14-drop" /> <!-- Col 9 -->

    <!-- ROW 12 (y = 190). Drops down to Row 13 at 65% -->
    <use href="#cube" x="120" y="190" fill="#006d32" class="row14-drop" /> <!-- Col 7 -->
  </g>

  <!-- ================= SIDE PANEL SECTION ================= -->
  <!-- Score Display Panel (Total Contributions) -->
  <g transform="translate(178, 20)">
    <rect x="0" y="0" width="122" height="52" rx="4" fill="#11111b" stroke="#45475a" stroke-width="2" />
    <text x="12" y="18" fill="#a6adc8" font-size="8.5" class="retro-font" letter-spacing="0.5">SCORE (TOTAL)</text>
    <text x="12" y="40" fill="#fab387" font-size="18" class="retro-font score-val">002388</text>
  </g>

  <!-- Yearly Contribution Panel (Real data count) -->
  <g transform="translate(178, 82)">
    <rect x="0" y="0" width="122" height="52" rx="4" fill="#11111b" stroke="#45475a" stroke-width="2" />
    <text x="12" y="18" fill="#a6adc8" font-size="8.5" class="retro-font" letter-spacing="0.5">YEARLY CONTRIB</text>
    <text x="12" y="40" fill="#a6e3a1" font-size="18" class="retro-font">001143</text>
  </g>

  <!-- Next Piece Preview -->
  <g transform="translate(178, 144)">
    <rect x="0" y="0" width="122" height="106" rx="4" fill="#11111b" stroke="#45475a" stroke-width="2" />
    <text x="12" y="18" fill="#a6adc8" font-size="8.5" class="retro-font" letter-spacing="0.5">NEXT</text>
    
    <!-- Drawing a 3D pixel J-Piece inside preview grid -->
    <g fill="#89b4fa">
      <use href="#cube" x="42" y="38" />
      <use href="#cube" x="42" y="52" />
      <use href="#cube" x="56" y="52" />
      <use href="#cube" x="70" y="52" />
    </g>
    
    <!-- Mini arcade details -->
    <circle cx="20" cy="85" r="3" fill="#f38ba8" />
    <circle cx="32" cy="85" r="3" fill="#f9e2af" />
    <circle cx="44" cy="85" r="3" fill="#a6e3a1" />
    <text x="110" y="90" fill="#585b70" font-size="8" class="retro-font" text-anchor="end">LVL 04</text>
  </g>
</svg>
