<svg viewBox="0 0 820 180" width="100%" height="180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- CRT Glow effect for retro screen -->
    <filter id="screen-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Scanline overlay pattern -->
    <pattern id="scanlines" width="100" height="3" patternUnits="userSpaceOnUse">
      <rect width="100" height="1" fill="#000000" opacity="0.25" />
    </pattern>

    <!-- Background dots pattern (53 cols x 7 rows, cell step 12.5px) -->
    <pattern id="grid-dots" width="12.5" height="12.5" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="1.2" fill="#2d3139" opacity="0.8" />
    </pattern>

    <!-- 3D Beveled Tetris Block Definition (10x10px size) -->
    <g id="mini-cube">
      <rect x="0" y="0" width="10" height="10" rx="1.5" />
      <!-- Light highlight (top and left) -->
      <rect x="0.8" y="0.8" width="8.4" height="1.2" fill="#ffffff" opacity="0.4" />
      <rect x="0.8" y="0.8" width="1.2" height="8.4" fill="#ffffff" opacity="0.4" />
      <!-- Dark shadow (bottom and right) -->
      <rect x="0.8" y="8.0" width="8.4" height="1.2" fill="#000000" opacity="0.5" />
      <rect x="8.0" y="0.8" width="1.2" height="8.4" fill="#000000" opacity="0.5" />
    </g>
  </defs>

  <style>
    /* Global Styles */
    .retro-font {
      font-family: 'Fira Code', 'Courier New', Courier, monospace;
      font-weight: 900;
    }

    /* Vibrant tailored green colors for high contrast */
    .lvl1 { fill: #104d2e; } /* Rich Dark Green */
    .lvl2 { fill: #1b894c; } /* Medium Fresh Green */
    .lvl3 { fill: #33cf73; } /* Bright Minty Green */
    .lvl4 { fill: #82ffb4; } /* Glowing Neon Lime Green */
    
    /* Animation Loop for falling piece in Column 52 (current week) */
    @keyframes fall-curr-week {
      0% { transform: translateY(-80px); opacity: 0; }
      5% { transform: translateY(-50px); opacity: 1; }
      45% { transform: translateY(12.5px); opacity: 1; } /* Lands on Row 1, 2, 3 (Translation 12.5px) */
      85% { transform: translateY(12.5px); opacity: 1; }
      90%, 100% { opacity: 0; } /* Reset */
    }
    .curr-week-fall {
      animation: fall-curr-week 8s infinite steps(1);
    }

    /* Floating glowing animations for scores */
    @keyframes stat-pulse {
      0%, 100% { fill: #82ffb4; }
      50% { fill: #33cf73; }
    }
    .score-glowing {
      animation: stat-pulse 3s infinite;
    }
  </style>

  <!-- Main Arcade Frame (Cabinet Box) -->
  <rect x="5" y="5" width="810" height="170" rx="12" ry="12" fill="#11111b" stroke="#313244" stroke-width="4" filter="url(#screen-glow)" />
  <rect x="12" y="12" width="796" height="156" rx="8" ry="8" fill="#181825" />
  <rect x="12" y="12" width="796" height="156" rx="8" ry="8" fill="url(#scanlines)" pointer-events="none" />

  <!-- ================= PLAYING BOARD (53 cols x 7 rows) ================= -->
  <!-- Board Borders -->
  <rect x="20" y="25" width="665" height="92" rx="4" fill="#0f0f15" stroke="#313244" stroke-width="1.5" />
  
  <!-- Grid Dots Background Pattern (empty days) -->
  <rect x="20" y="25" width="665" height="92" rx="4" fill="url(#grid-dots)" />

  <!-- Calendar Label Headings -->
  <text x="25" y="132" fill="#585b70" font-size="8" class="retro-font">Jul</text>
  <text x="120" y="132" fill="#585b70" font-size="8" class="retro-font">Sep</text>
  <text x="220" y="132" fill="#585b70" font-size="8" class="retro-font">Nov</text>
  <text x="320" y="132" fill="#585b70" font-size="8" class="retro-font">Jan</text>
  <text x="420" y="132" fill="#585b70" font-size="8" class="retro-font">Mar</text>
  <text x="520" y="132" fill="#585b70" font-size="8" class="retro-font">May</text>
  <text x="620" y="132" fill="#585b70" font-size="8" class="retro-font">Jul</text>

  <!-- ================= CHRONOLOGICAL CONTRIBUTION MAP (VIBRANT DATA RECTANGLES) ================= -->
  <!-- Represents the real distribution: Jul-Dec sparse, Feb-Jul dense active green.
       Col step: 12.5px. Row step: 12.5px.
       X coordinate: 20 + col * 12.5
       Y coordinate: 30 + row * 12.5
  -->
  <g>
    <!-- July - Dec 2025 (Cols 0-24) -->
    <use href="#mini-cube" x="32.5" y="42.5" class="lvl1" />   <!-- Col 1, Row 1 -->
    <use href="#mini-cube" x="82.5" y="42.5" class="lvl1" />   <!-- Col 5, Row 1 -->
    <use href="#mini-cube" x="95.0" y="30.0" class="lvl2" />   <!-- Col 6, Row 0 -->
    <use href="#mini-cube" x="95.0" y="42.5" class="lvl1" />   <!-- Col 6, Row 1 -->
    <use href="#mini-cube" x="95.0" y="55.0" class="lvl1" />   <!-- Col 6, Row 2 -->
    <use href="#mini-cube" x="120.0" y="80.0" class="lvl1" />  <!-- Col 8, Row 4 -->
    <use href="#mini-cube" x="145.0" y="55.0" class="lvl1" />  <!-- Col 10, Row 2 -->
    <use href="#mini-cube" x="245.0" y="67.5" class="lvl2" />  <!-- Col 18, Row 3 -->
    <use href="#mini-cube" x="295.0" y="80.0" class="lvl1" />  <!-- Col 22, Row 4 -->

    <!-- Jan - Mar 2026 (Cols 25-36) -->
    <use href="#mini-cube" x="345.0" y="67.5" class="lvl1" />  <!-- Col 26, Row 3 -->
    <use href="#mini-cube" x="395.0" y="30.0" class="lvl2" />  <!-- Col 30, Row 0 -->
    <use href="#mini-cube" x="395.0" y="55.0" class="lvl1" />  <!-- Col 30, Row 2 -->
    <use href="#mini-cube" x="395.0" y="80.0" class="lvl1" />  <!-- Col 30, Row 4 -->
    <use href="#mini-cube" x="407.5" y="42.5" class="lvl2" />  <!-- Col 31, Row 1 -->
    <use href="#mini-cube" x="407.5" y="67.5" class="lvl1" />  <!-- Col 31, Row 3 -->
    <use href="#mini-cube" x="420.0" y="55.0" class="lvl1" />  <!-- Col 32, Row 2 -->
    <use href="#mini-cube" x="420.0" y="67.5" class="lvl2" />  <!-- Col 32, Row 3 -->
    <use href="#mini-cube" x="420.0" y="92.5" class="lvl1" />  <!-- Col 32, Row 5 -->
    <use href="#mini-cube" x="445.0" y="42.5" class="lvl2" />  <!-- Col 34, Row 1 -->
    <use href="#mini-cube" x="445.0" y="55.0" class="lvl1" />  <!-- Col 34, Row 2 -->
    <use href="#mini-cube" x="445.0" y="80.0" class="lvl1" />  <!-- Col 34, Row 4 -->
    <use href="#mini-cube" x="457.5" y="30.0" class="lvl1" />  <!-- Col 35, Row 0 -->
    <use href="#mini-cube" x="457.5" y="67.5" class="lvl2" />  <!-- Col 35, Row 3 -->

    <!-- April - May 2026 (Cols 37-44) -->
    <use href="#mini-cube" x="495.0" y="30.0" class="lvl2" />  <!-- Col 38, Row 0 -->
    <use href="#mini-cube" x="495.0" y="42.5" class="lvl1" />  <!-- Col 38, Row 1 -->
    <use href="#mini-cube" x="495.0" y="67.5" class="lvl2" />  <!-- Col 38, Row 3 -->
    <use href="#mini-cube" x="495.0" y="92.5" class="lvl1" />  <!-- Col 38, Row 5 -->
    <use href="#mini-cube" x="507.5" y="55.0" class="lvl3" />  <!-- Col 39, Row 2 -->
    <use href="#mini-cube" x="507.5" y="80.0" class="lvl1" />  <!-- Col 39, Row 4 -->
    <use href="#mini-cube" x="507.5" y="105.0" class="lvl2" /> <!-- Col 39, Row 6 -->
    <use href="#mini-cube" x="520.0" y="42.5" class="lvl1" />  <!-- Col 40, Row 1 -->
    <use href="#mini-cube" x="520.0" y="67.5" class="lvl3" />  <!-- Col 40, Row 3 -->
    <use href="#mini-cube" x="520.0" y="92.5" class="lvl2" />  <!-- Col 40, Row 5 -->
    <use href="#mini-cube" x="532.5" y="42.5" class="lvl2" />  <!-- Col 41, Row 1 -->
    <use href="#mini-cube" x="532.5" y="55.0" class="lvl1" />  <!-- Col 41, Row 2 -->
    <use href="#mini-cube" x="532.5" y="67.5" class="lvl2" />  <!-- Col 41, Row 3 -->
    <use href="#mini-cube" x="532.5" y="80.0" class="lvl1" />  <!-- Col 41, Row 4 -->
    <use href="#mini-cube" x="545.0" y="55.0" class="lvl3" />  <!-- Col 42, Row 2 -->
    <use href="#mini-cube" x="545.0" y="67.5" class="lvl2" />  <!-- Col 42, Row 3 -->
    <use href="#mini-cube" x="545.0" y="80.0" class="lvl2" />  <!-- Col 42, Row 4 -->
    <use href="#mini-cube" x="545.0" y="92.5" class="lvl1" />  <!-- Col 42, Row 5 -->
    <use href="#mini-cube" x="557.5" y="30.0" class="lvl1" />  <!-- Col 43, Row 0 -->
    <use href="#mini-cube" x="557.5" y="42.5" class="lvl2" />  <!-- Col 43, Row 1 -->
    <use href="#mini-cube" x="557.5" y="67.5" class="lvl3" />  <!-- Col 43, Row 3 -->
    <use href="#mini-cube" x="557.5" y="80.0" class="lvl2" />  <!-- Col 43, Row 4 -->
    <use href="#mini-cube" x="570.0" y="55.0" class="lvl2" />  <!-- Col 44, Row 2 -->
    <use href="#mini-cube" x="570.0" y="67.5" class="lvl1" />  <!-- Col 44, Row 3 -->
    <use href="#mini-cube" x="570.0" y="92.5" class="lvl3" />  <!-- Col 44, Row 5 -->

    <!-- June - July 2026 (Cols 45-52) (Heavy Commit Wall) -->
    <!-- Col 45 -->
    <use href="#mini-cube" x="582.5" y="42.5" class="lvl3" /><use href="#mini-cube" x="582.5" y="55.0" class="lvl2" /><use href="#mini-cube" x="582.5" y="80.0" class="lvl4" /><use href="#mini-cube" x="582.5" y="92.5" class="lvl2" /><use href="#mini-cube" x="582.5" y="105.0" class="lvl3" />
    <!-- Col 46 -->
    <use href="#mini-cube" x="595.0" y="30.0" class="lvl2" /><use href="#mini-cube" x="595.0" y="42.5" class="lvl3" /><use href="#mini-cube" x="595.0" y="55.0" class="lvl4" /><use href="#mini-cube" x="595.0" y="67.5" class="lvl3" /><use href="#mini-cube" x="595.0" y="92.5" class="lvl2" /><use href="#mini-cube" x="595.0" y="105.0" class="lvl4" />
    <!-- Col 47 -->
    <use href="#mini-cube" x="607.5" y="42.5" class="lvl4" /><use href="#mini-cube" x="607.5" y="55.0" class="lvl3" /><use href="#mini-cube" x="607.5" y="67.5" class="lvl2" /><use href="#mini-cube" x="607.5" y="80.0" class="lvl3" /><use href="#mini-cube" x="607.5" y="92.5" class="lvl2" />
    <!-- Col 48 -->
    <use href="#mini-cube" x="620.0" y="30.0" class="lvl2" /><use href="#mini-cube" x="620.0" y="55.0" class="lvl3" /><use href="#mini-cube" x="620.0" y="67.5" class="lvl4" /><use href="#mini-cube" x="620.0" y="80.0" class="lvl2" /><use href="#mini-cube" x="620.0" y="92.5" class="lvl3" /><use href="#mini-cube" x="620.0" y="105.0" class="lvl1" />
    <!-- Col 49 -->
    <use href="#mini-cube" x="632.5" y="42.5" class="lvl4" /><use href="#mini-cube" x="632.5" y="55.0" class="lvl3" /><use href="#mini-cube" x="632.5" y="67.5" class="lvl2" /><use href="#mini-cube" x="632.5" y="80.0" class="lvl4" /><use href="#mini-cube" x="632.5" y="92.5" class="lvl3" />
    <!-- Col 50 -->
    <use href="#mini-cube" x="645.0" y="30.0" class="lvl2" /><use href="#mini-cube" x="645.0" y="55.0" class="lvl4" /><use href="#mini-cube" x="645.0" y="67.5" class="lvl3" /><use href="#mini-cube" x="645.0" y="80.0" class="lvl2" /><use href="#mini-cube" x="645.0" y="92.5" class="lvl3" /><use href="#mini-cube" x="645.0" y="105.0" class="lvl1" />
    <!-- Col 51 -->
    <use href="#mini-cube" x="657.5" y="42.5" class="lvl4" /><use href="#mini-cube" x="657.5" y="55.0" class="lvl3" /><use href="#mini-cube" x="657.5" y="67.5" class="lvl4" /><use href="#mini-cube" x="657.5" y="80.0" class="lvl2" /><use href="#mini-cube" x="657.5" y="92.5" class="lvl3" />
    <!-- Col 52 (Latest Week Static blocks) -->
    <use href="#mini-cube" x="670.0" y="30.0" class="lvl2" />  <!-- Col 52, Row 0 -->
    <use href="#mini-cube" x="670.0" y="92.5" class="lvl3" />  <!-- Col 52, Row 5 -->
    <use href="#mini-cube" x="670.0" y="105.0" class="lvl1" /> <!-- Col 52, Row 6 -->
  </g>

  <!-- ================= ANIMATED FALLING TETRIS PIECE ================= -->
  <!-- Falling I-Piece (3 blocks vertical) falling down Column 52 (x=670.0).
       It lands and locks on Row 1, 2, and 3.
       Blocks are drawn at top relative to y=30. Falling group shifts it by 12.5px.
  -->
  <g class="curr-week-fall" fill="#82ffb4">
    <use href="#mini-cube" x="670.0" y="30" />    <!-- Target absolute y = 42.5 (Row 1) -->
    <use href="#mini-cube" x="670.0" y="42.5" />  <!-- Target absolute y = 55.0 (Row 2) -->
    <use href="#mini-cube" x="670.0" y="55.0" />  <!-- Target absolute y = 67.5 (Row 3) -->
  </g>

  <!-- ================= RIGHT PANEL: STATS DISPLAY ================= -->
  <!-- Score Panel -->
  <g transform="translate(695, 25)">
    <rect x="0" y="0" width="105" height="42" rx="4" fill="#11111b" stroke="#313244" stroke-width="1.5" />
    <text x="10" y="14" fill="#a6adc8" font-size="7.5" class="retro-font">SCORE</text>
    <text x="10" y="32" fill="#fab387" font-size="14" class="retro-font score-glowing">002388</text>
  </g>

  <!-- Yearly contributions panel -->
  <g transform="translate(695, 75)">
    <rect x="0" y="0" width="105" height="42" rx="4" fill="#11111b" stroke="#313244" stroke-width="1.5" />
    <text x="10" y="14" fill="#a6adc8" font-size="7.5" class="retro-font">YEARLY</text>
    <text x="10" y="32" fill="#a6e3a1" font-size="14" class="retro-font">001143</text>
  </g>

  <!-- Decorative Console details -->
  <circle cx="705" cy="136" r="3" fill="#f38ba8" />
  <circle cx="717" cy="136" r="3" fill="#f9e2af" />
  <circle cx="729" cy="136" r="3" fill="#a6e3a1" />
  <text x="795" y="140" fill="#585b70" font-size="8.5" class="retro-font" text-anchor="end">LVL 04</text>
</svg>
